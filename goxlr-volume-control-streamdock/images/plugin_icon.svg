<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1c2e"/>
      <stop offset="100%" stop-color="#0d1018"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#bg)"/>
  <!-- Outer ring track -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="#1e2235" stroke-width="8"/>
  <!-- Arc fill (cyan, ~270deg) -->
  <path d="M 29.94 93.06 A 48 48 0 1 1 98.06 93.06"
        fill="none" stroke="#00e5ff" stroke-width="8"
        stroke-linecap="round" filter="url(#glow)"/>
  <!-- Center knob circle -->
  <circle cx="64" cy="64" r="22" fill="#22253a" stroke="#2e3350" stroke-width="2"/>
  <!-- Knob indicator line -->
  <line x1="64" y1="46" x2="64" y2="56" stroke="#00e5ff" stroke-width="3" stroke-linecap="round"/>
  <!-- GoXLR 'G' letter -->
  <text x="64" y="72" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, Arial, sans-serif" font-size="18"
        font-weight="900" fill="#00e5ff">G</text>
</svg>
